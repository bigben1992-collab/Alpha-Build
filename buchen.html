<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buchen</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --p: #0f172a; --a: #2563eb; --s: #22c55e; --d: #ef4444; --bg: #f1f5f9; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; }
    header { background: white; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; aspect-ratio: 1; background: #000; margin-bottom: 10px; }
    
    #reader video { filter: contrast(1.5) brightness(1.1) grayscale(0.5); object-fit: cover; }

    .controls { margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 10px; }
    .controls label { font-size: 12px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; }
    input[type=range] { width: 100%; cursor: pointer; }

    input[type=text], input[type=number] { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    /* Fokus-Hervorhebung */
    input:focus { border-color: var(--a); outline: none; background: #eff6ff; }

    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn { padding: 16px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
    .back { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--a); font-weight: bold; }
    #ov { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 10; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="ov"><b>Verarbeite...</b></div>
  <header><img src="logo.png" style="height:35px;"></header>
  <div class="container">
    <div class="card">
      <h3>📦 Buchen</h3>
      <div id="reader"></div>

      <div class="controls" id="camera-controls" style="display:none;">
        <label>Zoom / Fokus</label>
        <input type="range" id="zoom-range" min="1" max="5" step="0.1" value="1">
      </div>

      <input type="text" id="p" placeholder="Platz scannen" readonly onclick="this.value=''">
      <input type="text" id="a" placeholder="Artikel scannen" readonly onclick="this.value=''">
      <input type="number" id="m" value="1" placeholder="Menge">
      
      <div class="btn-row">
        <button class="btn" style="background:var(--s)" onclick="run('Einlagerung')">EIN</button>
        <button class="btn" style="background:var(--d)" onclick="run('Entnahme')">AUS</button>
      </div>
    </div>
    <a href="index.html" class="back">← Hauptmenü</a>
  </div>

  <script>
    var api = "https://script.google.com/macros/s/AKfycbxVzhqyg5a8pPQaanfcDEL-WqFRmBVMUP8eMBlwPxZ1aRFK-wSyhwok6R_uQ_PO4mc_/exec";
    var sc = new Html5Qrcode("reader");
    var track = null;
    var isScanning = false; // Sperre gegen Mehrfach-Erkennung

    async function run(t) {
      var art = document.getElementById('a').value, plz = document.getElementById('p').value;
      if(!art || !plz) return alert("Daten unvollständig!");
      document.getElementById('ov').style.display='flex';
      var nN = "";
      try {
        var r = await fetch(api+"?aktion=warensuche&artikelId="+art);
        var d = await r.json();
        if(!d.name) { 
          document.getElementById('ov').style.display='none'; 
          nN = prompt("Name für neuen Artikel:"); 
          if(!nN) return; 
          document.getElementById('ov').style.display='flex'; 
        }
        await fetch(api, {method:"POST", mode:"no-cors", body:JSON.stringify({daten:{typ:t, artikel:art, menge:document.getElementById('m').value, platz:plz, neuerName:nN}})});
        alert("Erfolgreich gebucht!"); 
        // Felder leeren und Scanner für nächsten Durchgang bereit machen
        document.getElementById('a').value="";
        document.getElementById('p').value="";
        location.reload(); // Seite neu laden ist der sicherste Weg, um den Kamera-Status sauber zu resetten
      } catch(e) { alert("Fehler!"); }
      document.getElementById('ov').style.display='none';
    }

    function startScanner() {
      sc.start({facingMode:"environment"}, {fps:20, qrbox:250}, (txt) => {
        if(isScanning) return; // Verhindert Verarbeitung während Pause
        
        isScanning = true;
        if(window.navigator.vibrate) window.navigator.vibrate(80);

        let pField = document.getElementById('p');
        let aField = document.getElementById('a');

        if(!pField.value) {
          pField.value = txt;
          aField.focus(); // Wechselt visuell zum nächsten Tab/Feld
        } else if(!aField.value) {
          aField.value = txt;
          // Wenn beide voll sind: Scanner stoppen um Doppelbuchung zu vermeiden
          sc.stop().then(() => { console.log("Scanner gestoppt - bereit zum Buchen"); });
        }

        // Kurze Sperre, damit derselbe Barcode nicht innerhalb von Millisekunden 2x triggert
        setTimeout(() => { isScanning = false; }, 1500);

      }).then(() => {
        track = sc.getRunningTrack();
        const capabilities = track.getCapabilities();
        if (capabilities.zoom) {
          document.getElementById('camera-controls').style.display = 'block';
          const zoomInput = document.getElementById('zoom-range');
          zoomInput.min = capabilities.zoom.min;
          zoomInput.max = capabilities.zoom.max;
          zoomInput.step = capabilities.zoom.step;
          zoomInput.addEventListener('input', () => {
            track.applyConstraints({ advanced: [{ zoom: zoomInput.value }] });
          });
        }
      }).catch(()=>{});
    }

    startScanner();
  </script>
</body>
</html>
