<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buchen</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --p: #0f172a; --a: #2563eb; --s: #22c55e; --d: #ef4444; --bg: #f1f5f9; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; }
    header { background: white; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; aspect-ratio: 1; background: #000; margin-bottom: 10px; position: relative; }
    #reader video { filter: contrast(1.6) brightness(1.1) grayscale(0.7); object-fit: cover; }
    .controls { margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; display: none; }
    .controls label { font-size: 11px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; }
    input[type=range] { width: 100%; cursor: pointer; height: 25px; }
    input[type=text], input[type=number] { width: 100%; padding: 14px; margin: 5px 0 15px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    input:focus { border-color: var(--a); background: #f0f7ff; outline: none; }
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
    .back { display: block; text-align: center; margin-top: 25px; text-decoration: none; color: var(--a); font-weight: bold; }
    #ov { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="ov"><b>⚙️ Verarbeitung...</b></div>
  <header><img src="logo.png" style="height:35px;"></header>
  <div class="container">
    <div class="card">
      <h3 style="margin-top:0;">📦 Lagerbuchung</h3>
      <div id="reader" onclick="triggerAutofocus()"></div>
      <div class="controls" id="camera-controls">
        <label>🔍 Zoom (Tippen für Fokus)</label>
        <input type="range" id="zoom-range" min="1" max="5" step="0.1" value="1">
      </div>
      <input type="text" id="p" placeholder="📍 Platz scannen" readonly>
      <input type="text" id="a" placeholder="🏷️ Artikel scannen" readonly>
      <input type="number" id="m" value="1">
      <div class="btn-row">
        <button class="btn" style="background:var(--s)" onclick="run('Einlagerung')">EIN</button>
        <button class="btn" style="background:var(--d)" onclick="run('Entnahme')">AUS</button>
      </div>
    </div>
    <a href="index.html" class="back">← Hauptmenü</a>
  </div>

  <script>
    const api = "https://script.google.com/macros/s/AKfycbxVzhqyg5a8pPQaanfcDEL-WqFRmBVMUP8eMBlwPxZ1aRFK-wSyhwok6R_uQ_PO4mc_/exec";
    const sc = new Html5Qrcode("reader");
    let track = null;
    let isLocked = false;

    // Fokus-Trigger verbessert: Nutzt applyConstraints sicher
    async function triggerAutofocus() {
      if (!track) return;
      try {
        const caps = track.getCapabilities();
        if (caps.focusMode) {
          await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
          if(window.navigator.vibrate) window.navigator.vibrate(20);
        }
      } catch (e) { console.warn("Fokus nicht steuerbar"); }
    }

    async function run(t) {
      const art = document.getElementById('a').value, plz = document.getElementById('p').value;
      if(!art || !plz) return alert("Daten fehlen!");
      document.getElementById('ov').style.display='flex';
      try {
        const r = await fetch(api+"?aktion=warensuche&artikelId="+art);
        const d = await r.json();
        let nN = "";
        if(!d.name) { 
          document.getElementById('ov').style.display='none'; 
          nN = prompt("Neuer Artikel Name:"); if(!nN) return;
          document.getElementById('ov').style.display='flex'; 
        }
        await fetch(api, {method:"POST", mode:"no-cors", body:JSON.stringify({daten:{typ:t, artikel:art, menge:document.getElementById('m').value, platz:plz, neuerName:nN}})});
        alert("Erfolg!"); location.reload();
      } catch(e) { alert("Fehler!"); }
      document.getElementById('ov').style.display='none';
    }

    const config = { 
      fps: 25, qrbox: 250, aspectRatio: 1.0,
      videoConstraints: { facingMode: "environment" }
    };

    sc.start({facingMode:"environment"}, config, (txt) => {
      if(isLocked) return;
      const pF = document.getElementById('p'), aF = document.getElementById('a');
      if(!pF.value) {
        pF.value = txt;
        if(window.navigator.vibrate) window.navigator.vibrate(50);
        isLocked = true; setTimeout(() => isLocked = false, 1200);
      } else if(!aF.value && pF.value !== txt) {
        aF.value = txt;
        if(window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
        sc.stop();
      }
    }).then(() => {
      // FEHLERBEHEBUNG: Sicherer Zugriff auf den Track
      // Manche Versionen nutzen getRunningTrack(), andere verlangen direkten Zugriff
      try {
        track = sc.getRunningTrack(); 
        const caps = track.getCapabilities();
        if (caps.zoom) {
          document.getElementById('camera-controls').style.display = 'block';
          const zI = document.getElementById('zoom-range');
          zI.min = caps.zoom.min; zI.max = caps.zoom.max; zI.step = caps.zoom.step;
          zI.oninput = () => track.applyConstraints({ advanced: [{ zoom: zI.value }] });
        }
      } catch (e) {
        console.error("Track-Zugriff fehlgeschlagen", e);
      }
    }).catch(err => console.error(err));
  </script>
</body>
</html>
