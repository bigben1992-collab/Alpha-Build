<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buchen</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --p: #0f172a; --a: #2563eb; --s: #22c55e; --d: #ef4444; --bg: #f1f5f9; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; }
    header { background: white; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    
    /* Container für Video */
    #reader { width: 100%; border-radius: 15px; overflow: hidden; aspect-ratio: 1; background: #000; margin-bottom: 10px; position: relative; cursor: crosshair; }
    
    /* Kontrastfilter für bessere Barcode-Kanten */
    #reader video { filter: contrast(1.6) brightness(1.1) grayscale(0.7); object-fit: cover; }

    .controls { margin-bottom: 15px; background: #f8fafc; padding: 10px; border-radius: 10px; border: 1px solid #e2e8f0; }
    .controls label { font-size: 11px; color: #64748b; font-weight: bold; display: block; margin-bottom: 5px; text-transform: uppercase; }
    input[type=range] { width: 100%; cursor: pointer; height: 25px; }

    input[type=text], input[type=number] { width: 100%; padding: 14px; margin: 5px 0 15px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; transition: 0.2s; }
    input:focus { border-color: var(--a); background: #f0f7ff; outline: none; }
    
    .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { padding: 18px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: opacity 0.2s; }
    .btn:active { opacity: 0.8; }
    
    .back { display: block; text-align: center; margin-top: 25px; text-decoration: none; color: var(--a); font-weight: bold; font-size: 14px; }
    #ov { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 100; flex-direction: column; align-items: center; justify-content: center; font-size: 18px; }
  </style>
</head>
<body>
  <div id="ov"><b>⚙️ Verarbeitung...</b></div>
  <header><img src="logo.png" style="height:35px;"></header>
  
  <div class="container">
    <div class="card">
      <h3 style="margin-top:0;">📦 Lagerbuchung</h3>
      
      <div id="reader" onclick="triggerAutofocus()"></div>

      <div class="controls" id="camera-controls" style="display:none;">
        <label>🔍 Digitaler Zoom (Hilft bei Fokus-Problemen)</label>
        <input type="range" id="zoom-range" min="1" max="5" step="0.1" value="1">
      </div>

      <input type="text" id="p" placeholder="📍 Platz scannen" readonly>
      <input type="text" id="a" placeholder="🏷️ Artikel scannen" readonly>
      <input type="number" id="m" value="1" placeholder="Menge">
      
      <div class="btn-row">
        <button class="btn" style="background:var(--s)" onclick="run('Einlagerung')">EINLAGERN</button>
        <button class="btn" style="background:var(--d)" onclick="run('Entnahme')">ENTNAHME</button>
      </div>
    </div>
    <a href="index.html" class="back">← Zurück zum Hauptmenü</a>
  </div>

  <script>
    const api = "https://script.google.com/macros/s/AKfycbxVzhqyg5a8pPQaanfcDEL-WqFRmBVMUP8eMBlwPxZ1aRFK-wSyhwok6R_uQ_PO4mc_/exec";
    const sc = new Html5Qrcode("reader");
    let track = null;
    let isLocked = false;

    // Manueller Autofokus-Trigger (beim Tippen auf das Video)
    async function triggerAutofocus() {
      if (track && track.getCapabilities().focusMode) {
        try {
          await track.applyConstraints({ advanced: [{ focusMode: "continuous" }, { focusMode: "manual" }] });
          await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
          console.log("Autofokus neu gestartet");
        } catch (e) { console.log("Fokus-Trigger nicht unterstützt"); }
      }
    }

    async function run(t) {
      const art = document.getElementById('a').value, plz = document.getElementById('p').value;
      if(!art || !plz) return alert("Bitte erst beide Barcodes scannen!");
      
      document.getElementById('ov').style.display='flex';
      let nN = "";
      try {
        const r = await fetch(api+"?aktion=warensuche&artikelId="+art);
        const d = await r.json();
        if(!d.name) { 
          document.getElementById('ov').style.display='none'; 
          nN = prompt("Neuer Artikel erkannt! Name eingeben:"); 
          if(!nN) return; 
          document.getElementById('ov').style.display='flex'; 
        }
        await fetch(api, {method:"POST", mode:"no-cors", body:JSON.stringify({daten:{typ:t, artikel:art, menge:document.getElementById('m').value, platz:plz, neuerName:nN}})});
        alert("Buchung erfolgreich!");
        location.reload(); 
      } catch(e) { alert("Netzwerkfehler!"); }
      document.getElementById('ov').style.display='none';
    }

    // Scanner Konfiguration
    const config = { 
      fps: 25, 
      qrbox: { width: 250, height: 250 },
      aspectRatio: 1.0,
      // Erzwingt Video-Constraints für besseren Fokus
      videoConstraints: {
        facingMode: "environment",
        focusMode: "continuous",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    };

    sc.start({facingMode:"environment"}, config, (txt) => {
      if(isLocked) return;
      
      const pField = document.getElementById('p');
      const aField = document.getElementById('a');

      if(!pField.value) {
        pField.value = txt;
        if(window.navigator.vibrate) window.navigator.vibrate(50);
        isLocked = true; 
        setTimeout(() => isLocked = false, 1000); // 1 Sekunde Pause gegen Doppel-Scan
      } else if(!aField.value && pField.value !== txt) {
        aField.value = txt;
        if(window.navigator.vibrate) window.navigator.vibrate([50, 50, 50]);
        sc.stop(); // Stoppt Kamera sobald alles voll ist
      }
    }).then(() => {
      track = sc.getRunningTrack();
      const caps = track.getCapabilities();

      // Zoom-Regler aktivieren falls möglich
      if (caps.zoom) {
        document.getElementById('camera-controls').style.display = 'block';
        const zIn = document.getElementById('zoom-range');
        zIn.min = caps.zoom.min; zIn.max = caps.zoom.max; zIn.step = caps.zoom.step;
        zIn.oninput = () => track.applyConstraints({ advanced: [{ zoom: zIn.value }] });
      }
    }).catch(err => alert("Kamera-Fehler: " + err));
  </script>
</body>
</html>
