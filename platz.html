<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Platz-Suche</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
    .card { background: white; max-width: 400px; margin: 0 auto; padding: 20px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
    #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid #e2e8f0; }
    input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
    input:focus { border-color: var(--primary); outline: none; }
    
    .result-container { border-top: 2px solid #f1f5f9; padding-top: 15px; min-height: 120px; }
    .item-box { background: #f1f5f9; padding: 15px; border-radius: 12px; border-left: 5px solid var(--primary); animation: fadeIn 0.3s ease; }
    .label { font-size: 0.75rem; color: #64748b; font-weight: bold; text-transform: uppercase; }
    .value { font-size: 1.1rem; font-weight: 700; display: block; margin-bottom: 10px; }
    
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
    button { background: var(--primary); color: white; border: none; padding: 10px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    button:disabled { background: #cbd5e1; cursor: not-allowed; }
    .status { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-top: 20px; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body>

<div class="card">
  <h2 style="text-align:center; margin-top:0;">📍 Platz-Inhalt</h2>
  <div id="reader"></div>
  <input type="text" id="platzInput" placeholder="Platz-ID eingeben..." oninput="sucheStarten()">

  <div id="result" class="result-container">
    <div class="status" id="state">Bereit...</div>
  </div>

  <div class="nav" id="navigation" style="display:none;">
    <button id="prevBtn" onclick="blaettern(-1)">←</button>
    <span id="pageCount" style="font-weight:bold; font-size:0.9rem;">1 / 1</span>
    <button id="nextBtn" onclick="blaettern(1)">→</button>
  </div>
</div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbyhihhCCCOw2G1rgd-_s4Q0A5_IwtAgvY5RggvosAu_-it4v20YoB6s9BqemxtZaycl/exec";
  let alleTreffer = [];
  let aktuellerIndex = 0;

  async function sucheStarten() {
    const id = document.getElementById("platzInput").value.trim();
    const state = document.getElementById("state");
    const nav = document.getElementById("navigation");
    const res = document.getElementById("result");

    if (id.length < 1) {
      res.innerHTML = '<div class="status">Bereit...</div>';
      nav.style.display = "none";
      return;
    }

    state.innerText = "Suche läuft...";
    
    try {
      // Wir rufen getLog ab, um ALLE Daten zu erhalten (getPlz liefert nur den 1. Treffer)
      // Falls getLog im Backend klemmt, stellen wir sicher, dass die URL korrekt ist.
      const response = await fetch(`${API_URL}?aktion=getLog`);
      const data = await response.json();
      
      const logData = data.log || data.Log; // Flexibel für Groß/Kleinschreibung
      if (!logData) {
        state.innerText = "Fehler: Log-Daten nicht erreichbar.";
        return;
      }

      // Filtere alle Einträge aus dem Log, die zu diesem Platz gehören
      // Struktur: [Zeit, Typ, ArtId, Name, Menge, Platz] -> Platz ist Index 5
      const platzBestand = {};
      logData.slice(1).forEach(row => {
        if (String(row[5]).toLowerCase() === id.toLowerCase()) {
          const artId = row[2];
          if (!platzBestand[artId]) {
            platzBestand[artId] = { id: artId, name: row[3], menge: 0 };
          }
          const menge = parseFloat(String(row[4]).replace(',', '.')) || 0;
          platzBestand[artId].menge += (row[1] === "Entnahme" ? -menge : menge);
        }
      });

      // Nur Artikel mit Bestand > 0 anzeigen
      alleTreffer = Object.values(platzBestand).filter(item => item.menge > 0);

      if (alleTreffer.length > 0) {
        aktuellerIndex = 0;
        nav.style.display = "flex";
        anzeigen();
      } else {
        res.innerHTML = '<div class="status">❌ Platz leer oder unbekannt.</div>';
        nav.style.display = "none";
      }
    } catch (e) {
      state.innerText = "⚠️ Verbindung fehlgeschlagen.";
    }
  }

  function anzeigen() {
    const item = alleTreffer[aktuellerIndex];
    document.getElementById("result").innerHTML = `
      <div class="item-box">
        <span class="label">Artikel-ID</span>
        <span class="value">${item.id}</span>
        <span class="label">Bezeichnung</span>
        <span class="value">${item.name}</span>
        <span class="label">Bestand am Platz</span>
        <span class="value" style="color:var(--primary); font-size:1.5rem;">${item.menge}</span>
      </div>
    `;
    document.getElementById("pageCount").innerText = `${aktuellerIndex + 1} / ${alleTreffer.length}`;
    document.getElementById("prevBtn").disabled = aktuellerIndex === 0;
    document.getElementById("nextBtn").disabled = aktuellerIndex === alleTreffer.length - 1;
  }

  function blaettern(richtung) {
    aktuellerIndex += richtung;
    anzeigen();
  }

  // Scanner Start
  const html5QrCode = new Html5Qrcode("reader");
  html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
    document.getElementById("platzInput").value = txt;
    sucheStarten();
  });
</script>
</body>
</html>
