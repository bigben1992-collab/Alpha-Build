<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Platz Info</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --p: #0f172a; --a: #2563eb; --bg: #f1f5f9; --accent: #8b5cf6; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
    header { background: white; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h3 { margin-top: 0; color: var(--p); border-bottom: 2px solid #eee; padding-bottom: 10px; }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 15px; }
    input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    
    .item-row { 
      background: #f8fafc; 
      padding: 12px; 
      border-radius: 10px; 
      border-left: 4px solid var(--accent); 
      margin-bottom: 8px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .item-name { font-weight: bold; color: var(--p); font-size: 0.95rem; }
    .item-id { font-size: 0.75rem; color: #64748b; }
    .item-qty { background: var(--accent); color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
    
    .status { text-align: center; color: #64748b; font-size: 0.9rem; margin-top: 10px; }
    .back { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--a); font-weight: bold; }
  </style>
</head>
<body>

<header><img src="logo.png" style="height:35px;"></header>

<div class="container">
  <div class="card">
    <h3>📍 Platz-Inhalt</h3>
    <div id="reader"></div>
    
    <input type="text" id="pi" placeholder="Platz scannen oder tippen..." oninput="check()">
    
    <div id="out">
      <div class="status">Warte auf Scan/Eingabe...</div>
    </div>
  </div>
  
  <a href="index.html" class="back">← Hauptmenü</a>
</div>

<script>
  // WICHTIG: Ersetze dies durch deine aktuelle Web-App URL
  const api = "https://script.google.com/macros/s/AKfycbyhihhCCCOw2G1rgd-_s4Q0A5_IwtAgvY5RggvosAu_-it4v20YoB6s9BqemxtZaycl/exec";
  const sc = new Html5Qrcode("reader");

  async function check() {
    const platzId = document.getElementById('pi').value.trim().toLowerCase();
    if (platzId.length < 1) return;

    const out = document.getElementById('out');
    
    try {
      // Wir nutzen getLog, um die Datenstruktur zu erhalten
      const r = await fetch(api + "?aktion=getLog");
      const data = await r.json();
      
      /** * Da getLog im Backend aktuell log und stamm liefert, 
       * aber wir die ECHTEN Bestände aus dem Sheet "Bestand" brauchen,
       * nutzen wir hier einen Workaround: Wir summieren die Bestände
       * aus dem Log, da wir das Backend nicht ändern dürfen.
       */
      const inventar = {};

      data.log.slice(1).forEach(entry => {
        const typ = entry[1];
        const artId = entry[2];
        const name = entry[3];
        const menge = parseFloat(entry[4]) || 0;
        const pId = entry[5].toString().trim().toLowerCase();

        if (pId === platzId) {
          if (!inventar[artId]) inventar[artId] = { name: name, menge: 0 };
          // Bestand berechnen: Alles außer Entnahme ist positiv
          const delta = (typ === "Entnahme") ? -menge : menge;
          inventar[artId].menge += delta;
        }
      });

      let html = `<h4>Platz: ${platzId.toUpperCase()}</h4>`;
      let gefunden = false;

      for (let id in inventar) {
        if (inventar[id].menge !== 0) { // Zeige auch negative Fehlerbestände zur Kontrolle
          gefunden = true;
          html += `
            <div class="item-row">
              <div style="display:flex; flex-direction:column;">
                <span class="item-name">${inventar[id].name}</span>
                <span class="item-id">ID: ${id}</span>
              </div>
              <span class="item-qty">${inventar[id].menge}</span>
            </div>`;
        }
      }

      out.innerHTML = gefunden ? html : '<div class="status">Platz ist leer oder existiert nicht.</div>';

    } catch(e) { 
      out.innerHTML = '<div class="status">Fehler beim Laden. URL korrekt?</div>'; 
    }
  }

  sc.start({facingMode:"environment"}, {fps:15, qrbox:250}, (txt) => {
    document.getElementById('pi').value = txt; 
    check();
  }).catch(()=>{});
</script>

</body>
</html>
