<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Platz Info</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --p: #0f172a; --a: #2563eb; --bg: #f1f5f9; --accent: #8b5cf6; }
    body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; }
    header { background: white; height: 60px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .container { max-width: 450px; margin: 0 auto; padding: 15px; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h3 { margin-top: 0; color: var(--p); border-bottom: 2px solid #eee; padding-bottom: 10px; }
    #reader { width: 100%; border-radius: 15px; overflow: hidden; background: #000; margin-bottom: 15px; min-height: 200px; }
    input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    
    .res-container { margin-top: 10px; }
    .platz-header { font-weight: bold; color: var(--accent); margin-bottom: 10px; font-size: 1.1rem; display: none; }
    
    .item-row { 
      background: #f8fafc; 
      padding: 12px; 
      border-radius: 10px; 
      border-left: 4px solid var(--accent); 
      margin-bottom: 8px; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
    }
    .item-name { font-weight: bold; color: var(--p); font-size: 0.95rem; }
    .item-id { font-size: 0.75rem; color: #64748b; }
    .item-qty { background: var(--accent); color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
    
    .status { text-align: center; color: #64748b; font-size: 0.9rem; margin-top: 10px; }
    .back { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: var(--a); font-weight: bold; }
  </style>
</head>
<body>

<header><img src="logo.png" style="height:35px;" onerror="this.style.display='none'"></header>

<div class="container">
  <div class="card">
    <h3>📍 Platz-Inhalt prüfen</h3>
    <div id="reader"></div>
    
    <label style="font-size: 0.8rem; font-weight: bold; color: #64748b;">Platz-ID</label>
    <input type="text" id="pi" placeholder="Platz scannen oder tippen..." oninput="check()">
    
    <div id="platzTitle" class="platz-header">Inhalt von: <span id="currentPlatz">-</span></div>
    
    <div id="out" class="res-container">
      <div class="status">Bereit zum Scannen...</div>
    </div>
  </div>
  
  <a href="index.html" class="back">← Hauptmenü</a>
</div>

<script>
  // URL DEINER WEB APP
  const api = "https://script.google.com/macros/s/AKfycbyhihhCCCOw2G1rgd-_s4Q0A5_IwtAgvY5RggvosAu_-it4v20YoB6s9BqemxtZaycl/exec";
  const sc = new Html5Qrcode("reader");

  async function check() {
    const platzId = document.getElementById('pi').value.trim();
    const out = document.getElementById('out');
    const title = document.getElementById('platzTitle');

    if (platzId.length < 1) {
      out.innerHTML = '<div class="status">Bereit zum Scannen...</div>';
      title.style.display = "none";
      return;
    }

    out.innerHTML = '<div class="status">Bestand wird berechnet...</div>';

    try {
      // 1. Daten vom Backend holen
      const response = await fetch(api + "?aktion=getLog");
      const data = await response.json();
      
      if (!data.log || data.log.length < 2) {
        out.innerHTML = '<div class="status">Keine Log-Daten vorhanden.</div>';
        return;
      }

      // 2. Bestand aggregieren
      const bestandAmPlatz = {};

      // Log-Struktur laut deinem Code: [Zeit, Typ, ArtId, Name, Menge, Platz, Preis]
      // Indexe: Typ=1, ArtId=2, Name=3, Menge=4, Platz=5
      data.log.slice(1).forEach(entry => {
        const typ = entry[1];
        const artId = entry[2];
        const name = entry[3];
        const menge = parseFloat(entry[4]) || 0;
        const pId = entry[5] ? entry[5].toString().trim() : "";

        // Nur Einträge für den gesuchten Platz beachten
        if (pId.toLowerCase() === platzId.toLowerCase()) {
          if (!bestandAmPlatz[artId]) {
            bestandAmPlatz[artId] = { name: name, menge: 0 };
          }
          
          if (typ === "Einlagerung") {
            bestandAmPlatz[artId].menge += menge;
          } else if (typ === "Entnahme") {
            bestandAmPlatz[artId].menge -= menge;
          }
        }
      });

      // 3. HTML generieren
      let html = "";
      let hatInhalt = false;

      document.getElementById('currentPlatz').innerText = platzId;
      title.style.display = "block";

      for (let id in bestandAmPlatz) {
        const item = bestandAmPlatz[id];
        // Nur anzeigen, wenn rechnerisch noch etwas da ist
        if (item.menge > 0) {
          hatInhalt = true;
          html += `
            <div class="item-row">
              <div style="display:flex; flex-direction:column;">
                <span class="item-name">${item.name}</span>
                <span class="item-id">ID: ${id}</span>
              </div>
              <span class="item-qty">${item.menge}</span>
            </div>
          `;
        }
      }

      out.innerHTML = hatInhalt ? html : '<div class="status">Dieser Platz ist aktuell leer (Bestand 0).</div>';

    } catch(e) { 
      console.error(e);
      out.innerHTML = '<div class="status" style="color:red;">Fehler bei der Datenabfrage.</div>'; 
    }
  }

  // Scanner Initialisierung
  sc.start({facingMode:"environment"}, {fps:15, qrbox:250}, (txt) => {
    document.getElementById('pi').value = txt; 
    check();
    if(window.navigator.vibrate) window.navigator.vibrate(50);
  }).catch(err => {
    console.error("Kamera-Fehler:", err);
    document.getElementById('out').innerHTML = '<div class="status">Kamera nicht aktiv oder blockiert.</div>';
  });
</script>

</body>
</html>
