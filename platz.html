<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lager - Platzfilter</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root { --primary: #2563eb; --bg: #f8fafc; --text: #0f172a; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
    .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; font-size: 1.25rem; text-align: center; color: var(--primary); }
    
    #reader { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 2px solid #e2e8f0; }
    
    .input-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 5px; color: #64748b; }
    input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: var(--primary); }

    .result-area { min-height: 100px; border-top: 2px solid #f1f5f9; pt: 20px; }
    .info-box { background: #f1f5f9; padding: 15px; border-radius: 10px; margin-top: 15px; border-left: 4px solid var(--primary); animation: fadeIn 0.3s ease; }
    .info-label { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .info-value { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; display: block; }
    
    .status { text-align: center; font-size: 0.9rem; color: #94a3b8; margin-top: 10px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="card">
  <h2>📍 Platz-Suche</h2>
  
  <div id="reader"></div>

  <div class="input-group">
    <label for="platzId">Platz-ID (Spalte A)</label>
    <input type="text" id="platzId" placeholder="Scannen oder Tippen..." oninput="suchePlatz()">
  </div>

  <div id="result" class="result-area">
    <div class="status" id="statusText">Warte auf Eingabe...</div>
  </div>
</div>

<script>
  // DEINE URL HIER EINTRAGEN
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhihhCCCOw2G1rgd-_s4Q0A5_IwtAgvY5RggvosAu_-it4v20YoB6s9BqemxtZaycl/exec";
  
  const scanner = new Html5Qrcode("reader");
  const resultDiv = document.getElementById("result");
  const statusText = document.getElementById("statusText");

  async function suchePlatz() {
    const id = document.getElementById("platzId").value.trim();
    
    if (id.length < 1) {
      resultDiv.innerHTML = '<div class="status">Warte auf Eingabe...</div>';
      return;
    }

    statusText.innerText = "Suche läuft...";

    try {
      // Nutzt aktion=pruefung aus deinem Backend
      const response = await fetch(`${WEB_APP_URL}?aktion=pruefung&platzId=${encodeURIComponent(id)}`);
      const data = await response.json();

      if (data.res) {
        // Spalte B = data.res.artikel, Spalte C = data.res.name
        resultDiv.innerHTML = `
          <div class="info-box">
            <span class="info-label">Artikel-ID (Spalte B)</span>
            <span class="info-value">${data.res.artikel}</span>
            
            <span class="info-label">Bezeichnung (Spalte C)</span>
            <span class="info-value">${data.res.name}</span>
            
            <span class="info-label">Bestand</span>
            <span class="info-value">${data.res.menge}</span>
          </div>
        `;
      } else {
        resultDiv.innerHTML = '<div class="status" style="color:#ef4444;">❌ Platz nicht gefunden oder leer.</div>';
      }
    } catch (err) {
      resultDiv.innerHTML = '<div class="status" style="color:#ef4444;">⚠️ Fehler beim Laden der Daten.</div>';
    }
  }

  // Scanner starten
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {
      document.getElementById("platzId").value = decodedText;
      suchePlatz();
    }
  ).catch(err => {
    console.warn("Scanner konnte nicht gestartet werden (Kamera-Berechtigung?).");
  });
</script>

</body>
</html>
