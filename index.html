<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Super Supreme System | Dashboard</title>
  <style>
    :root {
      --bg: #f1f5f9; 
      --card-bg: #ffffff;
      --primary: #2563eb;
      --text: #0f172a;
      --text-light: #64748b;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
    }

    header {
      width: 100%;
      background: white;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 15px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .menu-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 25px 10px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: all 0.2s ease;
      border: 1px solid rgba(0,0,0,0.05);
    }

    .menu-card:active {
      transform: scale(0.95);
      background-color: #f8fafc;
    }

    .icon-box {
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    .label {
      font-weight: 700;
      font-size: 1rem;
      margin-bottom: 4px;
    }

    .sub-label {
      font-size: 0.75rem;
      color: var(--text-light);
      font-weight: 400;
    }

    /* Akzentfarben */
    .buchen { border-top: 5px solid #2563eb; }
    .suche { border-top: 5px solid #22c55e; }
    .platz { border-top: 5px solid #8b5cf6; }
    .preise { border-top: 5px solid #f59e0b; }
    .verkauf { border-top: 5px solid #ef4444; } /* Neue Farbe für Verkauf */

    footer {
      margin-top: auto;
      padding: 30px;
      color: var(--text-light);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo.png" style="height:35px;" alt="Logo">
  </header>

  <main class="container">
    <a href="buchen.html" class="menu-card buchen">
      <span class="icon-box">📦</span>
      <span class="label">Buchen</span>
      <span class="sub-label">Ein- & Entnahme</span>
    </a>

    <a href="verkauf.html" class="menu-card verkauf">
      <span class="icon-box">🛒</span>
      <span class="label">Verkauf</span>
      <span class="sub-label">Kasse & Marge</span>
    </a>

    <a href="suche.html" class="menu-card suche">
      <span class="icon-box">🔍</span>
      <span class="label">Suche</span>
      <span class="sub-label">Bestand & Preis</span>
    </a>

    <a href="platz.html" class="menu-card platz">
      <span class="icon-box">📍</span>
      <span class="label">Plätze</span>
      <span class="sub-label">Inhalt prüfen</span>
    </a>

    <a href="preis_update.html" class="menu-card preise">
      <span class="icon-box">💰</span>
      <span class="label">Preise</span>
      <span class="sub-label">Stammdaten</span>
    </a>
  </main>

  <footer>
    Super Supreme System &bull; 2026
  </footer>

</body>
</html>
